openapi: 3.0.0

info:
  title: JengaMart API
  description: Backend API for construction materials e-commerce platform
  version: 1.0.0

servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Products
    description: Product management
  - name: Orders
    description: Order processing

paths:
  /health:
    get:
      summary: API health check
      tags: [Health]
      responses:
        200:
          description: API is running
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        201:
          description: User registered successfully

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful

  /products:
    get:
      summary: Get products (supports pagination, search, category filter)
      tags: [Products]
      parameters:
        - in: query
          name: page
          schema: { type: integer, example: 1 }
        - in: query
          name: limit
          schema: { type: integer, example: 12 }
        - in: query
          name: search
          schema: { type: string, example: cement }
        - in: query
          name: category
          schema: { type: string, example: cement }
      responses:
        200:
          description: Products returned

    post:
      summary: Create a product (Admin only)
      tags: [Products]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, unit, stock]
              properties:
                name: { type: string }
                price: { type: number }
                unit: { type: string }
                stock: { type: integer }
                category: { type: string }
                description: { type: string }
      responses:
        201:
          description: Product created

  /products/{id}:
    get:
      summary: Get a single product by ID
      tags: [Products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Product returned
        404:
          description: Product not found
            /payments/mpesa:
    post:
      summary: Initiate M-Pesa payment (placeholder)
      tags: [Payments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, phone]
              properties:
                orderId: { type: string }
                phone: { type: string, example: "2547XXXXXXXX" }
      responses:
        200:
          description: Payment initiated

  /payments/mpesa/callback:
    post:
      summary: Payment callback (webhook simulation)
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentId, receiptNumber]
              properties:
                paymentId: { type: string }
                receiptNumber: { type: string }
      responses:
        200:
          description: Payment confirmed

  /admin/orders:
    get:
      summary: Admin - get all orders
      tags: [Admin]
      security:
        - BearerAuth: []
      responses:
        200:
          description: Orders returned

  /admin/orders/{id}/status:
    put:
      summary: Admin - update order status
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  example: SHIPPED
      responses:
        200:
          description: Status updated